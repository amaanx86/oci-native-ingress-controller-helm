name: Validate and Publish Helm Chart to GHCR

on:
  release:
    types: [published]

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Validate Helm chart
        run: |
          helm lint .
          helm template oci-native-ingress-controller . > /dev/null

      - name: Extract chart version
        id: chart
        run: |
          VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Package Helm chart
        run: |
          mkdir -p chart-release
          helm package . --destination chart-release/

      - name: Generate Helm repository index
        run: |
          helm repo index chart-release --url https://raw.githubusercontent.com/${{ github.repository }}/main/chart-release

      - name: Commit and push index.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chart-release/index.yaml
          git commit -m "chore: update Helm repository index for v${{ steps.chart.outputs.version }}" || echo "No changes to commit"
          git push

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push chart to GHCR
        run: |
          helm push chart-release/oci-native-ingress-controller-${{ steps.chart.outputs.version }}.tgz oci://ghcr.io/${{ github.repository_owner }}

      - name: Upload chart to release assets
        uses: softprops/action-gh-release@v2
        with:
          files: chart-release/*.tgz
          token: ${{ secrets.GITHUB_TOKEN }}
