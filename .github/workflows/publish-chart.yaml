name: Release and Publish Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - 'Chart.yaml'
      - 'values.yaml'
      - 'templates/**'
      - '.github/workflows/publish-chart.yaml'

permissions:
  contents: write
  packages: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Validate Helm chart
        run: |
          helm lint .
          helm template oci-native-ingress-controller . > /dev/null

      - name: Extract chart version
        id: chart
        run: |
          VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Package Helm chart
        run: |
          mkdir -p gh-pages
          helm package . --destination gh-pages/

      - name: Generate Helm repository index
        run: |
          helm repo index gh-pages --url https://github.com/${{ github.repository }}/releases/download/v${{ steps.chart.outputs.version }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push chart to GHCR (OCI)
        run: |
          helm push gh-pages/oci-native-ingress-controller-${{ steps.chart.outputs.version }}.tgz oci://ghcr.io/${{ github.repository_owner }}

      - name: Create Release
        run: |
          gh release create v${{ steps.chart.outputs.version }} \
            gh-pages/oci-native-ingress-controller-${{ steps.chart.outputs.version }}.tgz \
            --title "Release v${{ steps.chart.outputs.version }}" \
            --generate-notes \
            --draft=false \
            2>/dev/null || echo "Release already exists"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
